<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>No-Award Review – Template</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/reviews-no-awards.css">
  <script src="../js/reviews-no-awards.js" defer></script>
</head>
<body>
<div class="page">

  <h1 class="review-title">Place Name</h1>
  <p class="review-meta">Location • Date Visited</p>

  <div class="rating-box">
    <div class="star-bar" data-rating="4.5"></div>
    <div class="rating-text">4.5 / 5</div>
    <div class="return-text">Would I return: Yes</div>
  </div>

  <div class="divider"></div>

  <h2>Summary</h2>
  <p>Short summary here...</p>

  <h2>Full Diary Entry</h2>
  <p>Long diary-style writing here...</p>

  <h2>Tips for Visitors</h2>
  <div class="tips-box">
    <ul>
      <li>Tip 1</li>
      <li>Tip 2</li>
    </ul>
  </div>

  <h2>Photos</h2>
  <p>(Optional photo section)</p>

  <h2>Map</h2>
  <p>(Optional map link)</p>

</div>
</body>
</html>
